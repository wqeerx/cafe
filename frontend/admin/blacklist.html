<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zerno — Чёрный список</title>
    <link rel="stylesheet" href="../shared/zerno-theme.css">
    <script src="../shared/zerno-dialog.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0">
    <style>
        .menu-toolbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
            padding: 16px;
            background: white;
            border: 1px solid var(--border);
            border-radius: 14px;
        }
        .menu-toolbar-left {
            flex: 1 1 240px;
            min-width: 200px;
        }
        .menu-toolbar-right {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            margin-left: auto;
            justify-content: flex-end;
        }
        .menu-search-input {
            width: 100%;
            max-width: 380px;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-family: inherit;
            font-size: 14px;
            color: var(--text-dark);
            background: #faf9f6;
            box-sizing: border-box;
        }
        .menu-search-input:focus {
            outline: none;
            border-color: var(--primary-light);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(82, 52, 38, 0.08);
        }
        .menu-toolbar label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            white-space: nowrap;
        }
        .role-filters {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
        }
        .role-filters .tab {
            margin: 0;
            padding: 8px 14px;
            font-size: 13px;
        }
        .role-filters .tab .tab-count {
            display: inline-block;
            min-width: 1.25em;
            margin-left: 4px;
            padding: 1px 6px;
            border-radius: 8px;
            background: rgba(44, 24, 16, 0.08);
            font-size: 12px;
            font-weight: 600;
        }
        .role-filters .tab.active .tab-count {
            background: rgba(255, 255, 255, 0.2);
        }
        .order-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 12px;
        }
        .user-card-body p {
            margin: 6px 0 0;
            font-size: 14px;
            color: var(--text-muted);
        }
        .user-card-body p.muted {
            font-size: 13px;
            color: #7a5a4a;
        }
        .user-card-actions {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
            flex-shrink: 0;
        }
        .blocked-badge {
            background: #fff3cd;
            color: #856404;
        }
        .active-badge {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .btn-edit, .btn-delete {
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: var(--transition);
            font-family: inherit;
            white-space: nowrap;
        }
        .btn-edit {
            background-color: #fef4d7;
            color: #856404;
        }
        .btn-edit:hover {
            background-color: #ffc107;
            color: var(--primary);
        }
        .btn-delete {
            background-color: #fde8eb;
            color: var(--danger);
        }
        .btn-delete:hover {
            background-color: var(--danger);
            color: white;
        }
        .menu-pagination {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 24px;
        }
        .menu-page-info {
            font-size: 13px;
            color: var(--text-muted);
            margin-right: 8px;
        }
        .menu-page-btn {
            min-width: 36px;
            padding: 8px 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-dark);
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        .menu-page-btn:hover:not(:disabled) {
            border-color: var(--primary-light);
            background: #faf9f6;
        }
        .menu-page-btn.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }
        .menu-page-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }
    </style>
</head>
<body class="zerno-panel">
    <div class="container">
        <div class="header">
            <h2><span class="material-symbols-rounded">block</span> Блокировка учётных записей</h2>
            <a href="index.html" class="back-btn"><span class="material-symbols-rounded" style="font-size:18px;">arrow_back</span> На главную</a>
        </div>

        <div class="form-panel">
            <div class="menu-toolbar">
                <div class="menu-toolbar-left">
                    <input type="search" id="search" class="menu-search-input"
                        placeholder="Поиск: телефон, email, имя…"
                        oninput="onFilterChange()" autocomplete="off">
                </div>
                <div class="menu-toolbar-right">
                    <label for="roleTabs">Тип:</label>
                    <div class="role-filters" id="roleTabs"></div>
                </div>
            </div>

            <div id="usersList">Загрузка…</div>
            <div id="usersPagination" class="menu-pagination"></div>
        </div>
    </div>

    <script>
        const API = '/api';
        const token = localStorage.getItem('token');
        const USERS_PAGE_SIZE = 10;
        const ROLE_TABS = [
            { id: 'all', label: 'Все' },
            { id: 'client', label: 'Клиенты' },
            { id: 'employee', label: 'Сотрудники' }
        ];

        let allUsers = [];
        let currentRole = 'all';
        let usersPage = 1;

        function esc(s) {
            return String(s == null ? '' : s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        function userRole(u) {
            return String(u.role || '').trim().toLowerCase();
        }

        function getRoleCounts() {
            const clients = allUsers.filter(u => userRole(u) === 'client').length;
            const employees = allUsers.filter(u => userRole(u) === 'employee').length;
            return { all: allUsers.length, client: clients, employee: employees };
        }

        function renderRoleTabs() {
            const counts = getRoleCounts();
            const el = document.getElementById('roleTabs');
            el.innerHTML = ROLE_TABS.map(tab => {
                const active = tab.id === currentRole ? ' active' : '';
                const count = counts[tab.id] ?? 0;
                return `<button type="button" class="tab${active}" data-role="${tab.id}">${esc(tab.label)} <span class="tab-count">${count}</span></button>`;
            }).join('');
            el.querySelectorAll('.tab').forEach(btn => {
                btn.onclick = () => {
                    currentRole = btn.dataset.role;
                    usersPage = 1;
                    renderRoleTabs();
                    renderUsers();
                };
            });
        }

        function getFilteredUsers() {
            const search = document.getElementById('search').value.toLowerCase().trim();
            let list = [...allUsers];

            if (currentRole === 'client') {
                list = list.filter(u => userRole(u) === 'client');
            } else if (currentRole === 'employee') {
                list = list.filter(u => userRole(u) === 'employee');
            }

            if (search) {
                list = list.filter(u =>
                    (u.phone && String(u.phone).toLowerCase().includes(search)) ||
                    (u.email && String(u.email).toLowerCase().includes(search)) ||
                    (u.fullname && String(u.fullname).toLowerCase().includes(search))
                );
            }

            return list;
        }

        function renderUsersPagination(totalItems, page, totalPages) {
            const el = document.getElementById('usersPagination');
            if (!el) return;
            if (!totalItems) {
                el.innerHTML = '';
                return;
            }
            const from = (page - 1) * USERS_PAGE_SIZE + 1;
            const to = Math.min(page * USERS_PAGE_SIZE, totalItems);
            let html = `<span class="menu-page-info">${from}–${to} из ${totalItems}</span>`;
            if (totalPages > 1) {
                html += `<button type="button" class="menu-page-btn" onclick="goUsersPage(${page - 1})" ${page <= 1 ? 'disabled' : ''}>‹</button>`;
                for (let p = 1; p <= totalPages; p++) {
                    if (totalPages > 7 && Math.abs(p - page) > 2 && p !== 1 && p !== totalPages) {
                        if (p === 2 || p === totalPages - 1) html += '<span class="menu-page-info">…</span>';
                        continue;
                    }
                    html += `<button type="button" class="menu-page-btn${p === page ? ' active' : ''}" onclick="goUsersPage(${p})">${p}</button>`;
                }
                html += `<button type="button" class="menu-page-btn" onclick="goUsersPage(${page + 1})" ${page >= totalPages ? 'disabled' : ''}>›</button>`;
            }
            el.innerHTML = html;
        }

        function goUsersPage(page) {
            usersPage = page;
            renderUsers();
            document.getElementById('usersList')?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function onFilterChange() {
            usersPage = 1;
            renderUsers();
        }

        function renderUsers() {
            const list = getFilteredUsers();
            const totalPages = Math.max(1, Math.ceil(list.length / USERS_PAGE_SIZE) || 1);
            if (usersPage > totalPages) usersPage = totalPages;
            if (usersPage < 1) usersPage = 1;

            renderRoleTabs();

            const container = document.getElementById('usersList');
            if (!list.length) {
                const search = document.getElementById('search').value.trim();
                container.innerHTML = `<p style="text-align:center;padding:40px;color:#7a5a4a;">${search || currentRole !== 'all' ? 'Ничего не найдено' : 'Нет учётных записей'}</p>`;
                renderUsersPagination(0, 1, 1);
                return;
            }

            const start = (usersPage - 1) * USERS_PAGE_SIZE;
            const pageItems = list.slice(start, start + USERS_PAGE_SIZE);

            container.innerHTML = pageItems.map(user => {
                const blocked = user.is_blocked === 1 || user.is_blocked === true;
                const statusClass = blocked ? 'blocked-badge' : 'active-badge';
                const ordersLine = userRole(user) === 'client'
                    ? `<p class="muted">Заказов: ${user.orders_count || 0}</p>`
                    : '';
                return `
                <div class="order-card">
                    <div class="order-card-header">
                        <div class="user-card-body">
                            <strong>${esc(user.fullname || user.phone || '—')}</strong>
                            <span class="status-badge ${statusClass}">${blocked ? 'Заблокирован' : 'Активен'}</span>
                            <p>${esc(user.phone || '—')} · ${esc(user.email || '—')}</p>
                            <p class="muted">Зарегистрирован: ${esc(user.created_at ? String(user.created_at).slice(0, 10) : '—')}</p>
                            ${ordersLine}
                        </div>
                        <div class="user-card-actions">
                            <button type="button" class="${blocked ? 'btn-edit' : 'btn-delete'}" onclick="toggleBlock(${user.id})">
                                <span class="material-symbols-rounded" style="font-size:16px;">${blocked ? 'lock_open' : 'block'}</span>
                                ${blocked ? 'Разблокировать' : 'Заблокировать'}
                            </button>
                        </div>
                    </div>
                </div>`;
            }).join('');

            renderUsersPagination(list.length, usersPage, totalPages);
        }

        async function loadUsers() {
            const container = document.getElementById('usersList');
            const headers = { Authorization: 'Bearer ' + token };
            try {
                const [clientsRes, employeesRes] = await Promise.all([
                    fetch(API + '/admin/users-list?type=client', { headers }),
                    fetch(API + '/admin/users-list?type=employee', { headers })
                ]);

                if (clientsRes.status === 401 || clientsRes.status === 403 ||
                    employeesRes.status === 401 || employeesRes.status === 403) {
                    window.location.href = '/employee/login.html';
                    return;
                }
                if (!clientsRes.ok || !employeesRes.ok) {
                    throw new Error('load failed');
                }

                const clients = await clientsRes.json();
                const employees = await employeesRes.json();
                allUsers = [
                    ...(Array.isArray(clients) ? clients : []),
                    ...(Array.isArray(employees) ? employees : [])
                ];
                usersPage = 1;
                renderUsers();
            } catch (error) {
                console.error(error);
                container.innerHTML = '<p style="text-align:center;padding:40px;color:var(--danger);">Не удалось загрузить список</p>';
                document.getElementById('usersPagination').innerHTML = '';
            }
        }

        async function toggleBlock(userId) {
            const user = allUsers.find(u => String(u.id) === String(userId));
            if (!user) return;
            const blocked = user.is_blocked === 1 || user.is_blocked === true;
            const name = esc(user.fullname || user.phone || 'пользователя');
            const ok = await showAppConfirm(
                `${blocked ? 'Разблокировать' : 'Заблокировать'} учётную запись <strong>${name}</strong>?`,
                {
                    title: blocked ? 'Разблокировка' : 'Блокировка',
                    confirmLabel: blocked ? 'Разблокировать' : 'Заблокировать',
                    cancelLabel: 'Отмена',
                    danger: !blocked,
                    html: true
                }
            );
            if (!ok) return;

            const action = blocked ? 'unblock' : 'block';
            try {
                const res = await fetch(API + `/admin/users/${userId}/${action}`, {
                    method: 'PUT',
                    headers: { Authorization: 'Bearer ' + token }
                });
                if (res.ok) {
                    appNotify(blocked ? 'Пользователь разблокирован' : 'Пользователь заблокирован', 'success');
                    loadUsers();
                } else {
                    const data = await res.json().catch(() => ({}));
                    appNotify(data.error || 'Ошибка', 'error');
                }
            } catch (error) {
                appNotify('Ошибка соединения', 'error');
            }
        }

        if (!token) {
            window.location.href = '/employee/login.html';
        } else {
            loadUsers();
        }
    </script>
</body>
</html>
