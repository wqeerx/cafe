<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zerno — Столы</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f0e8; color: #2c1810; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .header {
            background: #2c1810; color: #e8d5b5; padding: 15px 25px; border-radius: 15px;
            margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;
        }
        .back-btn {
            background: #e8d5b5; color: #2c1810; padding: 8px 20px; border-radius: 30px;
            text-decoration: none; font-weight: 600;
        }
        .panel {
            background: white; border-radius: 16px; padding: 24px; border: 1px solid #e0d0c0; margin-bottom: 20px;
        }
        .form-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: end; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #7a7065; }
        .form-group input {
            padding: 10px 14px; border: 2px solid #e0d0c0; border-radius: 12px; font-family: inherit; width: 120px;
        }
        .btn-primary {
            background: #2c1810; color: #e8d5b5; border: none; padding: 10px 22px;
            border-radius: 30px; cursor: pointer; font-weight: 600;
        }
        .btn-danger {
            background: transparent; border: 1px solid #c0392b; color: #c0392b;
            padding: 6px 14px; border-radius: 20px; cursor: pointer;
        }
        table { width: 100%; border-collapse: collapse; margin-top: 12px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f5f0e8; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2><span class="material-symbols-rounded" style="vertical-align:middle">table_restaurant</span> Управление столами</h2>
            <a href="index.html" class="back-btn">← На главную</a>
        </div>

        <div class="panel">
            <h3 style="margin-bottom:16px;">Добавить стол</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>Номер стола</label>
                    <input type="number" id="tableNumber" min="1">
                </div>
                <div class="form-group">
                    <label>Вместимость</label>
                    <input type="number" id="tableCapacity" min="1" max="12" value="4">
                </div>
                <button class="btn-primary" onclick="addTable()">Добавить</button>
            </div>
        </div>

        <div class="panel">
            <h3>Список столов</h3>
            <div id="tablesList"><p>Загрузка...</p></div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:3000/api';
        const token = localStorage.getItem('token');

        async function loadTables() {
            const res = await fetch(API + '/tables', { headers: { Authorization: 'Bearer ' + token } });
            const tables = await res.json();
            const el = document.getElementById('tablesList');
            if (!tables.length) {
                el.innerHTML = '<p>Столов пока нет</p>';
                return;
            }
            el.innerHTML = '<table><tr><th>№</th><th>Вместимость</th><th></th></tr>' +
                tables.map(t => '<tr><td>' + t.number + '</td><td>' + t.capacity + ' мест</td><td>' +
                '<button class="btn-danger" onclick="deleteTable(' + t.id + ')">Удалить</button></td></tr>').join('') +
                '</table>';
        }

        async function addTable() {
            const number = parseInt(document.getElementById('tableNumber').value, 10);
            const capacity = parseInt(document.getElementById('tableCapacity').value, 10);
            if (!number || !capacity) { alert('Укажите номер и вместимость'); return; }
            const res = await fetch(API + '/admin/tables', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
                body: JSON.stringify({ number, capacity })
            });
            if (res.ok) {
                document.getElementById('tableNumber').value = '';
                loadTables();
            } else {
                const d = await res.json();
                alert(d.error || 'Ошибка');
            }
        }

        async function deleteTable(id) {
            if (!confirm('Удалить стол?')) return;
            await fetch(API + '/admin/tables/' + id, {
                method: 'DELETE',
                headers: { Authorization: 'Bearer ' + token }
            });
            loadTables();
        }

        window.onload = () => {
            if (!token) { location.href = '/employee/login.html'; return; }
            loadTables();
        };
    </script>
</body>
</html>
