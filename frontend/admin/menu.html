<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zerno — Управление меню</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..24,400,0..1,0">
    <style>
        :root {
            --bg-main: #fcfaf7;
            --bg-card: #ffffff;
            --primary: #2c1810;
            --primary-light: #523426;
            --accent: #e8d5b5;
            --text-dark: #2c1810;
            --text-muted: #6e5d55;
            --border: #e6ded6;
            --danger: #dc3545;
            --danger-hover: #bd2130;
            --warning: #ffc107;
            --warning-hover: #e0a800;
            --shadow-sm: 0 2px 8px rgba(44, 24, 16, 0.04);
            --shadow-md: 0 12px 30px rgba(44, 24, 16, 0.06);
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-dark);
            padding: 30px 20px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background-color: var(--primary);
            color: var(--accent);
            padding: 20px 30px;
            border-radius: 16px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .header h2 {
            font-size: 22px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .back-btn {
            background-color: transparent;
            color: var(--accent);
            border: 1px solid rgba(232, 213, 181, 0.3);
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
        }

        .back-btn:hover {
            background-color: var(--accent);
            color: var(--primary);
            border-color: var(--accent);
        }

        .form-panel {
            background-color: var(--bg-card);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }

        .form-panel h2 {
            color: var(--text-dark);
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-weight: 600;
            color: var(--text-dark);
            font-size: 13px;
        }

        .form-group input, .form-group select, .form-group textarea {
            padding: 11px 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-family: inherit;
            font-size: 14px;
            color: var(--text-dark);
            background-color: #faf9f6;
            transition: var(--transition);
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-light);
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(82, 52, 38, 0.08);
        }

        .category-manager {
            display: flex;
            gap: 20px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .category-manager .form-group {
            flex: 1;
            min-width: 240px;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: var(--transition);
        }

        .btn-primary:hover {
            background-color: var(--primary-light);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background-color: #e6ded6;
            color: var(--text-dark);
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: var(--transition);
        }

        .btn-secondary:hover {
            background-color: #dad1c7;
        }

        .category-list {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-top: 10px;
        }

        .category-card-admin {
            background-color: #fbf9f6;
            border-radius: 12px;
            padding: 16px;
            width: 190px;
            text-align: center;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: var(--transition);
        }

        .category-card-admin:hover {
            border-color: var(--primary-light);
            box-shadow: var(--shadow-sm);
        }

        .category-card-admin .category-image {
            width: 100%;
            height: 100px;
            background-color: #f2ebe1;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .category-card-admin .category-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .category-card-admin .category-name {
            font-weight: 600;
            font-size: 14px;
            color: var(--text-dark);
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }

        .category-card-admin .btn-delete-cat {
            background-color: transparent;
            color: var(--danger);
            border: 1px solid rgba(220, 53, 69, 0.2);
            padding: 4px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: var(--transition);
        }

        .category-card-admin .btn-delete-cat:hover {
            background-color: var(--danger);
            color: white;
            border-color: var(--danger);
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
            margin: 40px 0 20px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 24px;
        }

        .menu-card {
            background-color: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
        }

        .menu-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
            border-color: var(--primary-light);
        }

        .card-image {
            height: 190px;
            background-color: #f2ebe1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: var(--text-muted);
            position: relative;
        }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-image .placeholder-icon {
            font-size: 48px;
            color: #d1c4b6;
        }

        .card-info {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 4px;
        }

        .card-category {
            font-size: 13px;
            color: #a89285;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .card-meta {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 10px;
        }

        .nutrition {
            font-size: 12px;
            color: var(--text-muted);
            background-color: #faf7f2;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 16px;
            line-height: 1.4;
            border: 1px dashed var(--border);
        }

        .price-row {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 10px;
        }

        .price {
            font-size: 20px;
            color: var(--text-dark);
            font-weight: 700;
        }

        .card-actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }

        .btn-edit, .btn-delete {
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            flex: 1;
            font-weight: 600;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: var(--transition);
        }

        .btn-edit {
            background-color: #fef4d7;
            color: #856404;
        }

        .btn-edit:hover {
            background-color: var(--warning);
            color: var(--primary);
        }

        .btn-delete {
            background-color: #fde8eb;
            color: var(--danger);
        }

        .btn-delete:hover {
            background-color: var(--danger);
            color: white;
        }

        .edit-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(44, 24, 16, 0.4);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .edit-modal-content {
            background-color: var(--bg-card);
            padding: 32px;
            border-radius: 20px;
            width: 600px;
            max-width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border);
        }

        .modal-header {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
        }

        .modal-form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        .span-2 {
            grid-column: span 2;
        }

        @media (max-width: 768px) {
            .modal-form-grid {
                grid-template-columns: 1fr;
            }
            .span-2 {
                grid-column: span 1;
            }
            .header {
                flex-direction: column;
                gap: 16px;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h2><span class="material-symbols-rounded">restaurant_menu</span> Управление меню</h2>
            <a href="index.html" class="back-btn">
                <span class="material-symbols-rounded" style="font-size: 18px;">arrow_back</span> На главную
            </a>
        </div>

        <div class="form-panel">
            <h2><span class="material-symbols-rounded">sell</span> Управление категориями</h2>
            <div class="category-manager">
                <div class="form-group">
                    <label>Название категории *</label>
                    <input type="text" id="newCategoryName" placeholder="Например: Круассаны">
                </div>
                <div class="form-group">
                    <label>URL фотографии (опционально)</label>
                    <input type="url" id="newCategoryImage" placeholder="https://example.com/croissant.jpg">
                </div>
                <button class="btn-primary" onclick="addCategory()">
                    <span class="material-symbols-rounded" style="font-size: 18px;">add</span> Добавить категорию
                </button>
            </div>
            <div id="categoryList" class="category-list"></div>
        </div>

        <div class="form-panel">
            <h2><span class="material-symbols-rounded">add_box</span> Добавить новую позицию</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>Название *</label>
                    <input type="text" id="itemName" placeholder="Латте">
                </div>
                <div class="form-group">
                    <label>Категория *</label>
                    <select id="itemCategory"></select>
                </div>
                <div class="form-group">
                    <label>Цена (BYN) *</label>
                    <input type="number" id="itemPrice" min="0.01" step="0.01" placeholder="4.50">
                </div>
                <div class="form-group">
                    <label>Вес/объём (например: 250 мл) *</label>
                    <input type="text" id="itemWeight" placeholder="250 мл">
                </div>
                <div class="form-group">
                    <label>Белки (г)</label>
                    <input type="number" id="itemProtein" min="0" step="0.1" placeholder="3.5">
                </div>
                <div class="form-group">
                    <label>Жиры (г)</label>
                    <input type="number" id="itemFat" min="0" step="0.1" placeholder="2.1">
                </div>
                <div class="form-group">
                    <label>Углеводы (г)</label>
                    <input type="number" id="itemCarbs" min="0" step="0.1" placeholder="12.0">
                </div>
                <div class="form-group">
                    <label>Калории (ккал)</label>
                    <input type="number" id="itemCalories" min="0" step="1" placeholder="85">
                </div>
                <div class="form-group span-2">
                    <label>Состав</label>
                    <textarea id="itemComposition" rows="2" placeholder="Эспрессо, молоко, сироп"></textarea>
                </div>
                <div class="form-group span-2">
                    <label>Описание</label>
                    <textarea id="itemDescription" rows="2" placeholder="Нежный кофе с молоком"></textarea>
                </div>
                <div class="form-group span-2">
                    <label>URL фотографии</label>
                    <input type="url" id="itemImageUrl" placeholder="https://example.com/coffee.jpg">
                </div>
            </div>
            <button class="btn-primary" style="margin-top: 24px;" onclick="addMenuItem()">
                <span class="material-symbols-rounded" style="font-size: 18px;">add</span> Добавить позицию
            </button>
        </div>

        <h2 class="section-title"><span class="material-symbols-rounded">local_cafe</span> Текущее меню</h2>
        <div id="menuList" class="menu-grid">Загрузка меню...</div>
    </div>

    <div id="editModal" class="edit-modal">
        <div class="edit-modal-content">
            <div class="modal-header">
                <span class="material-symbols-rounded">edit_note</span> Редактировать позицию
            </div>
            <input type="hidden" id="editId">
            <div class="modal-form-grid">
                <div class="form-group"><label>Название *</label><input type="text" id="editName"></div>
                <div class="form-group"><label>Категория *</label><select id="editCategory"></select></div>
                <div class="form-group"><label>Цена (BYN) *</label><input type="number" id="editPrice" min="0.01" step="0.01"></div>
                <div class="form-group"><label>Вес/объём *</label><input type="text" id="editWeight"></div>
                <div class="form-group"><label>Белки (г)</label><input type="number" id="editProtein" min="0" step="0.1"></div>
                <div class="form-group"><label>Жиры (г)</label><input type="number" id="editFat" min="0" step="0.1"></div>
                <div class="form-group"><label>Углеводы (г)</label><input type="number" id="editCarbs" min="0" step="0.1"></div>
                <div class="form-group"><label>Калории (ккал)</label><input type="number" id="editCalories" min="0" step="1"></div>
                <div class="form-group span-2"><label>Состав</label><textarea id="editComposition" rows="2"></textarea></div>
                <div class="form-group span-2"><label>Описание</label><textarea id="editDescription" rows="2"></textarea></div>
                <div class="form-group span-2"><label>URL фото</label><input type="url" id="editImageUrl"></div>
            </div>
            <div style="display: flex; gap: 12px; justify-content: flex-end;">
                <button class="btn-secondary" onclick="closeEditModal()">Отмена</button>
                <button class="btn-primary" onclick="updateMenuItem()">Сохранить изменения</button>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:3000/api';
        let token = localStorage.getItem('token');
        let categories = [];
        let menuItems = [];

        // Вспомогательная функция безопасного экранирования текста
        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        // ============ УПРАВЛЕНИЕ КАТЕГОРИЯМИ ============
        async function loadCategories() {
            try {
                const res = await fetch(API + '/categories');
                categories = await res.json();
                
                const select = document.getElementById('itemCategory');
                const editSelect = document.getElementById('editCategory');
                
                select.innerHTML = '<option value="">Выберите категорию</option>' + 
                    categories.map(c => `<option value="${c.id}">${escapeHTML(c.name)}</option>`).join('');
                editSelect.innerHTML = categories.map(c => `<option value="${c.id}">${escapeHTML(c.name)}</option>`).join('');
                
                displayCategoryList();
            } catch (err) {
                console.error("Ошибка загрузки категорий:", err);
            }
        }

        function displayCategoryList() {
            const container = document.getElementById('categoryList');
            container.innerHTML = categories.map(cat => {
                const imgBlock = cat.image_url ? 
                    `<img src="${escapeHTML(cat.image_url)}" alt="${escapeHTML(cat.name)}" onerror="this.onerror=null; this.parentElement.innerHTML='<span class=\\'material-symbols-rounded placeholder-icon\\'>coffe</span>'">` : 
                    `<span class="material-symbols-rounded placeholder-icon" style="font-size:32px;color:#d1c4b6;">coffee</span>`;

                return `
                    <div class="category-card-admin">
                        <div class="category-image">${imgBlock}</div>
                        <div class="category-name" title="${escapeHTML(cat.name)}">${escapeHTML(cat.name)}</div>
                        <button class="btn-delete-cat" onclick="deleteCategory(${cat.id})">
                            <span class="material-symbols-rounded" style="font-size:14px;">delete</span> Удалить
                        </button>
                    </div>
                `;
            }).join('');
        }

        async function addCategory() {
            const name = document.getElementById('newCategoryName').value.trim();
            const image_url = document.getElementById('newCategoryImage').value.trim();
            
            if (!name) return alert('Введите название категории');
            
            const res = await fetch(API + '/admin/categories', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify({ name, image_url })
            });
            
            if (res.ok) {
                document.getElementById('newCategoryName').value = '';
                document.getElementById('newCategoryImage').value = '';
                loadCategories();
            } else {
                alert('Ошибка добавления категории');
            }
        }

        async function deleteCategory(id) {
            if (confirm('Удалить категорию? Связанные товары останутся без категории.')) {
                await fetch(API + `/admin/categories/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                loadCategories();
                loadMenu();
            }
        }

        // ============ УПРАВЛЕНИЕ ТОВАРАМИ ============
        async function loadMenu() {
            try {
                const res = await fetch(API + '/menu');
                menuItems = await res.json();
                const container = document.getElementById('menuList');
                
                if (menuItems.length === 0) {
                    container.innerHTML = '<div style="color:var(--text-muted);">Меню пусто. Добавьте первый товар!</div>';
                    return;
                }

                container.innerHTML = menuItems.map(item => {
                    const categoryName = categories.find(c => c.id === item.category_id)?.name || 'Без категории';
                    const imgBlock = item.image_url ? 
                        `<img src="${escapeHTML(item.image_url)}" alt="${escapeHTML(item.name)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"><div class="placeholder-icon" style="display:none;"><span class="material-symbols-rounded" style="font-size:48px;">local_cafe</span></div>` : 
                        `<div class="placeholder-icon"><span class="material-symbols-rounded" style="font-size:48px;">local_cafe</span></div>`;

                    return `
                        <div class="menu-card">
                            <div class="card-image">${imgBlock}</div>
                            <div class="card-info">
                                <div class="card-title">${escapeHTML(item.name)}</div>
                                <div class="card-category">${escapeHTML(categoryName)}</div>
                                <div class="card-meta">
                                    <span class="material-symbols-rounded" style="font-size:15px;">box</span>
                                    ${escapeHTML(item.weight || 'Не указан')}
                                </div>
                                <div class="nutrition">
                                    <strong>Ккал:</strong> ${item.calories || 0} | 
                                    <strong>Б:</strong> ${item.protein || 0}г | 
                                    <strong>Ж:</strong> ${item.fat || 0}г | 
                                    <strong>У:</strong> ${item.carbs || 0}г
                                </div>
                                <div class="price-row">
                                    <div class="price">${item.price.toFixed(2)} BYN</div>
                                </div>
                                <div class="card-actions">
                                    <button class="btn-edit" onclick='openEditModal(${JSON.stringify(item).replace(/'/g, "&apos;")})'>
                                        <span class="material-symbols-rounded" style="font-size:16px;">edit</span> Редактировать
                                    </button>
                                    <button class="btn-delete" onclick="deleteMenuItem(${item.id})">
                                        <span class="material-symbols-rounded" style="font-size:16px;">delete</span> Удалить
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                console.error("Ошибка загрузки меню:", err);
            }
        }

        // Вспомогательный метод валидации числовых КБЖУ и цен перед отправкой
        function validateMenuItemData(item) {
            if (!item.name.trim()) { alert('Укажите название позиции'); return false; }
            if (!item.category_id) { alert('Выберите категорию'); return false; }
            if (!item.weight.trim()) { alert('Укажите вес или объём (например: 250 мл)'); return false; }
            
            if (isNaN(item.price) || item.price <= 0) { alert('Цена должна быть строго больше нуля!'); return false; }
            if (isNaN(item.protein) || item.protein < 0) { alert('Белки не могут быть отрицательными!'); return false; }
            if (isNaN(item.fat) || item.fat < 0) { alert('Жиры не могут быть отрицательными!'); return false; }
            if (isNaN(item.carbs) || item.carbs < 0) { alert('Углеводы не могут быть отрицательными!'); return false; }
            if (isNaN(item.calories) || item.calories < 0) { alert('Калории не могут быть отрицательными!'); return false; }
            
            return true;
        }

        async function addMenuItem() {
            const item = {
                name: document.getElementById('itemName').value,
                category_id: document.getElementById('itemCategory').value,
                price: parseFloat(document.getElementById('itemPrice').value),
                weight: document.getElementById('itemWeight').value,
                protein: parseFloat(document.getElementById('itemProtein').value) || 0,
                fat: parseFloat(document.getElementById('itemFat').value) || 0,
                carbs: parseFloat(document.getElementById('itemCarbs').value) || 0,
                calories: parseInt(document.getElementById('itemCalories').value) || 0,
                composition: document.getElementById('itemComposition').value,
                description: document.getElementById('itemDescription').value,
                image_url: document.getElementById('itemImageUrl').value
            };

            if (!validateMenuItemData(item)) return;
            
            const res = await fetch(API + '/admin/menu', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify(item)
            });
            
            if (res.ok) {
                loadMenu();
                clearItemForm();
            } else {
                alert('Ошибка при сохранении позиции на сервере');
            }
        }

        function openEditModal(item) {
            document.getElementById('editId').value = item.id;
            document.getElementById('editName').value = item.name;
            document.getElementById('editCategory').value = item.category_id;
            document.getElementById('editPrice').value = item.price;
            document.getElementById('editWeight').value = item.weight || '';
            document.getElementById('editProtein').value = item.protein || 0;
            document.getElementById('editFat').value = item.fat || 0;
            document.getElementById('editCarbs').value = item.carbs || 0;
            document.getElementById('editCalories').value = item.calories || 0;
            document.getElementById('editComposition').value = item.composition || '';
            document.getElementById('editDescription').value = item.description || '';
            document.getElementById('editImageUrl').value = item.image_url || '';
            document.getElementById('editModal').style.display = 'flex';
        }

        async function updateMenuItem() {
            const id = document.getElementById('editId').value;
            const item = {
                name: document.getElementById('editName').value,
                category_id: document.getElementById('editCategory').value,
                price: parseFloat(document.getElementById('editPrice').value),
                weight: document.getElementById('editWeight').value,
                protein: parseFloat(document.getElementById('editProtein').value) || 0,
                fat: parseFloat(document.getElementById('editFat').value) || 0,
                carbs: parseFloat(document.getElementById('editCarbs').value) || 0,
                calories: parseInt(document.getElementById('editCalories').value) || 0,
                composition: document.getElementById('editComposition').value,
                description: document.getElementById('editDescription').value,
                image_url: document.getElementById('editImageUrl').value
            };

            if (!validateMenuItemData(item)) return;

            const res = await fetch(API + `/admin/menu/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify(item)
            });
            
            if (res.ok) {
                closeEditModal();
                loadMenu();
            } else {
                alert('Ошибка обновления позиции');
            }
        }

        async function deleteMenuItem(id) {
            if (confirm('Вы действительно хотите удалить эту позицию из меню?')) {
                await fetch(API + `/admin/menu/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                loadMenu();
            }
        }

        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        function clearItemForm() {
            document.getElementById('itemName').value = '';
            document.getElementById('itemCategory').value = '';
            document.getElementById('itemPrice').value = '';
            document.getElementById('itemWeight').value = '';
            document.getElementById('itemProtein').value = '';
            document.getElementById('itemFat').value = '';
            document.getElementById('itemCarbs').value = '';
            document.getElementById('itemCalories').value = '';
            document.getElementById('itemComposition').value = '';
            document.getElementById('itemDescription').value = '';
            document.getElementById('itemImageUrl').value = '';
        }

        window.onload = () => {
            if (!token) window.location.href = '/employee/login.html';
            loadCategories();
            loadMenu();
        };
    </script>
</body>
</html>
