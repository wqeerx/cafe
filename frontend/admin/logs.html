<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zerno — Журнал действий</title>
    <link rel="stylesheet" href="../shared/zerno-theme.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0">
    <style>
        .menu-toolbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: flex-end;
            gap: 16px;
            margin-bottom: 20px;
            padding: 16px;
            background: white;
            border: 1px solid var(--border);
            border-radius: 14px;
        }
        .menu-toolbar-fields {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            gap: 14px;
            flex: 1;
        }
        .filter-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 6px;
        }
        .filter-group input,
        .filter-group select {
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-family: inherit;
            font-size: 14px;
            color: var(--text-dark);
            background: #faf9f6;
            box-sizing: border-box;
        }
        .filter-group input:focus,
        .filter-group select:focus {
            outline: none;
            border-color: var(--primary-light);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(82, 52, 38, 0.08);
        }
        .filter-group.search-wide {
            flex: 1 1 220px;
            min-width: 200px;
        }
        .filter-group.search-wide input {
            width: 100%;
            max-width: 380px;
        }
        .btn-apply {
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 0;
        }
        table.logs-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 15px;
        }
        .logs-table th {
            background: var(--primary);
            color: var(--accent);
            padding: 14px 16px;
            text-align: left;
            font-weight: 600;
            font-size: 14px;
        }
        .logs-table td {
            padding: 14px 16px;
            border-bottom: 1px solid #f0ebe3;
            vertical-align: top;
            color: var(--text-dark);
        }
        .logs-table tr:nth-child(even) td {
            background: #faf9f6;
        }
        .log-action {
            font-weight: 500;
            line-height: 1.45;
        }
        .log-meta {
            font-size: 13px;
            color: var(--text-muted);
        }
        .role-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
        }
        .role-employee {
            background: #e8dcc8;
            color: var(--primary);
        }
        .role-admin {
            background: var(--primary);
            color: var(--accent);
        }
        .empty {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 15px;
        }
        .menu-pagination {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 24px;
        }
        .menu-page-info {
            font-size: 13px;
            color: var(--text-muted);
            margin-right: 8px;
        }
        .menu-page-btn {
            min-width: 36px;
            padding: 8px 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-dark);
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        .menu-page-btn:hover:not(:disabled) {
            border-color: var(--primary-light);
            background: #faf9f6;
        }
        .menu-page-btn.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }
        .menu-page-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }
    </style>
</head>
<body class="zerno-panel">
    <div class="container">
        <div class="header">
            <h2><span class="material-symbols-rounded">history</span> Журнал действий</h2>
            <a href="index.html" class="back-btn">
                <span class="material-symbols-rounded" style="font-size:18px;">arrow_back</span> На главную
            </a>
        </div>

        <div class="form-panel">
            <div class="menu-toolbar">
                <div class="menu-toolbar-fields">
                    <div class="filter-group search-wide">
                        <label for="searchLog">Поиск</label>
                        <input type="search" id="searchLog" placeholder="Действие, ФИО, телефон…"
                            onkeydown="if (event.key === 'Enter') applyFilters()" autocomplete="off">
                    </div>
                    <div class="filter-group">
                        <label for="filterRole">Роль</label>
                        <select id="filterRole" onchange="applyFilters()">
                            <option value="all">Все</option>
                            <option value="employee">Сотрудник</option>
                            <option value="admin">Администратор</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="dateFrom">С даты</label>
                        <input type="date" id="dateFrom" onchange="applyFilters()">
                    </div>
                    <div class="filter-group">
                        <label for="dateTo">До даты</label>
                        <input type="date" id="dateTo" onchange="applyFilters()">
                    </div>
                    <button type="button" class="btn-primary btn-apply" onclick="applyFilters()">Найти</button>
                </div>
            </div>

            <div class="logs-table-wrap">
                <div id="logsTableHost"><p class="empty">Загрузка…</p></div>
            </div>
            <div id="logsPagination" class="menu-pagination"></div>
        </div>
    </div>

    <script>
        const API = '/api';
        const token = localStorage.getItem('token');
        const LOGS_PAGE_SIZE = 10;

        let allLogs = [];
        let logsPage = 1;

        function esc(s) {
            return String(s == null ? '' : s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        function formatDt(iso) {
            if (!iso) return '—';
            const d = new Date(iso);
            if (Number.isNaN(d.getTime())) return '—';
            return d.toLocaleString('ru-RU', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function roleLabel(role) {
            if (role === 'admin') return 'Администратор';
            if (role === 'employee') return 'Сотрудник';
            return role || '—';
        }

        async function fetchLogs() {
            const params = new URLSearchParams();
            const search = document.getElementById('searchLog').value.trim();
            const role = document.getElementById('filterRole').value;
            const from = document.getElementById('dateFrom').value;
            const to = document.getElementById('dateTo').value;
            if (search) params.set('search', search);
            if (role) params.set('role', role);
            if (from) params.set('from', from);
            if (to) params.set('to', to);

            const res = await fetch(API + '/admin/action-logs?' + params.toString(), {
                headers: { Authorization: 'Bearer ' + token }
            });
            if (!res.ok) throw new Error('Ошибка загрузки');
            const rows = await res.json();
            return Array.isArray(rows) ? rows : [];
        }

        function renderLogsPagination(totalItems, page, totalPages) {
            const el = document.getElementById('logsPagination');
            if (!el) return;
            if (!totalItems) {
                el.innerHTML = '';
                return;
            }
            const from = (page - 1) * LOGS_PAGE_SIZE + 1;
            const to = Math.min(page * LOGS_PAGE_SIZE, totalItems);
            let html = `<span class="menu-page-info">${from}–${to} из ${totalItems}</span>`;
            if (totalPages > 1) {
                html += `<button type="button" class="menu-page-btn" onclick="goLogsPage(${page - 1})" ${page <= 1 ? 'disabled' : ''}>‹</button>`;
                for (let p = 1; p <= totalPages; p++) {
                    if (totalPages > 7 && Math.abs(p - page) > 2 && p !== 1 && p !== totalPages) {
                        if (p === 2 || p === totalPages - 1) html += '<span class="menu-page-info">…</span>';
                        continue;
                    }
                    html += `<button type="button" class="menu-page-btn${p === page ? ' active' : ''}" onclick="goLogsPage(${p})">${p}</button>`;
                }
                html += `<button type="button" class="menu-page-btn" onclick="goLogsPage(${page + 1})" ${page >= totalPages ? 'disabled' : ''}>›</button>`;
            }
            el.innerHTML = html;
        }

        function goLogsPage(page) {
            logsPage = page;
            renderLogsTable();
            document.querySelector('.logs-table-wrap')?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function renderLogsTable() {
            const host = document.getElementById('logsTableHost');
            const totalPages = Math.max(1, Math.ceil(allLogs.length / LOGS_PAGE_SIZE) || 1);
            if (logsPage > totalPages) logsPage = totalPages;
            if (logsPage < 1) logsPage = 1;

            if (!allLogs.length) {
                host.innerHTML = '<p class="empty">Записей не найдено</p>';
                renderLogsPagination(0, 1, 1);
                return;
            }

            const start = (logsPage - 1) * LOGS_PAGE_SIZE;
            const pageRows = allLogs.slice(start, start + LOGS_PAGE_SIZE);

            host.innerHTML = `
                <table class="logs-table">
                    <thead>
                        <tr>
                            <th>Дата</th>
                            <th>Действие</th>
                            <th>Пользователь</th>
                            <th>Роль</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${pageRows.map((r) => `
                            <tr>
                                <td class="log-meta">${formatDt(r.created_at)}</td>
                                <td class="log-action">${esc(r.action)}</td>
                                <td>
                                    <div>${esc(r.fullname || '—')}</div>
                                    ${r.phone ? `<div class="log-meta">${esc(r.phone)}</div>` : ''}
                                </td>
                                <td>
                                    <span class="role-badge role-${r.role === 'admin' ? 'admin' : 'employee'}">${esc(roleLabel(r.role))}</span>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>`;

            renderLogsPagination(allLogs.length, logsPage, totalPages);
        }

        async function applyFilters() {
            const host = document.getElementById('logsTableHost');
            host.innerHTML = '<p class="empty">Загрузка…</p>';
            document.getElementById('logsPagination').innerHTML = '';
            logsPage = 1;
            try {
                allLogs = await fetchLogs();
                renderLogsTable();
            } catch (e) {
                console.error(e);
                host.innerHTML = '<p class="empty">Не удалось загрузить журнал</p>';
                document.getElementById('logsPagination').innerHTML = '';
            }
        }

        if (!token) {
            location.href = '/employee/login.html';
        } else {
            applyFilters();
        }
    </script>
</body>
</html>
