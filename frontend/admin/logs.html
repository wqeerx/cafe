<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zerno — Журнал действий</title>
    <link rel="stylesheet" href="../shared/zerno-theme.css">
    <script src="../shared/zerno-utils.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f5f0e8; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        .header { background: #2c1810; color: #e8d5b5; padding: 15px 25px; border-radius: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .back-btn { background: #e8d5b5; color: #2c1810; padding: 8px 20px; border-radius: 30px; text-decoration: none; font-weight: 600; }
        .filters {
            background: white; border-radius: 16px; padding: 20px; border: 1px solid #e0d0c0;
            margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 14px; align-items: end;
        }
        .filter-group label { display: block; font-size: 12px; font-weight: 600; color: #7a7065; margin-bottom: 6px; }
        .filter-group input, .filter-group select {
            padding: 10px 14px; border: 2px solid #e0d0c0; border-radius: 12px; font-family: inherit;
        }
        .search-wide { flex: 1; min-width: 200px; }
        .search-wide input { width: 100%; }
        .btn-apply {
            background: #2c1810; color: #e8d5b5; border: none; padding: 11px 22px;
            border-radius: 30px; cursor: pointer; font-weight: 600;
        }
        .logs-table-wrap { background: white; border-radius: 16px; border: 1px solid #e0d0c0; overflow: hidden; }
        table.logs-table { width: 100%; border-collapse: collapse; font-size: 14px; }
        .logs-table th {
            background: #2c1810; color: #e8d5b5; padding: 12px 14px; text-align: left; font-weight: 600;
        }
        .logs-table td { padding: 12px 14px; border-bottom: 1px solid #f0ebe3; vertical-align: top; }
        .logs-table tr:nth-child(even) td { background: #fef8f0; }
        .log-action { font-weight: 500; color: #2c1810; }
        .log-meta { font-size: 12px; color: #7a5a4a; }
        .role-badge {
            display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600;
        }
        .role-employee { background: #e8dcc8; color: #2c1810; }
        .role-admin { background: #2c1810; color: #e8d5b5; }
        .empty { text-align: center; padding: 40px; color: #7a7065; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Журнал действий</h2>
            <a href="index.html" class="back-btn">← На главную</a>
        </div>

        <div class="filters">
            <div class="filter-group search-wide">
                <label>Поиск</label>
                <input type="text" id="searchLog" placeholder="Действие, ФИО, телефон..." onkeydown="if(event.key==='Enter')load()">
            </div>
            <div class="filter-group">
                <label>Роль</label>
                <select id="filterRole">
                    <option value="all">Все</option>
                    <option value="employee">Сотрудник</option>
                    <option value="admin">Администратор</option>
                </select>
            </div>
            <div class="filter-group">
                <label>С даты</label>
                <input type="date" id="dateFrom">
            </div>
            <div class="filter-group">
                <label>По дату</label>
                <input type="date" id="dateTo">
            </div>
            <button type="button" class="btn-apply" onclick="load()">Найти</button>
        </div>

        <div class="logs-table-wrap">
            <div id="logsTableHost"><p class="empty">Загрузка...</p></div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:3000/api';
        const token = localStorage.getItem('token');

        function buildQuery() {
            const p = new URLSearchParams();
            const search = document.getElementById('searchLog').value.trim();
            const role = document.getElementById('filterRole').value;
            const from = document.getElementById('dateFrom').value;
            const to = document.getElementById('dateTo').value;
            if (search) p.set('search', search);
            if (role && role !== 'all') p.set('role', role);
            if (from) p.set('from', from);
            if (to) p.set('to', to);
            const qs = p.toString();
            return qs ? '?' + qs : '';
        }

        async function load() {
            const host = document.getElementById('logsTableHost');
            host.innerHTML = '<p class="empty">Загрузка...</p>';
            try {
                const res = await fetch(API + '/admin/action-logs' + buildQuery(), {
                    headers: { Authorization: 'Bearer ' + token }
                });
                if (!res.ok) {
                    host.innerHTML = '<p class="empty">Ошибка загрузки</p>';
                    return;
                }
                const logs = await res.json();
                if (!logs.length) {
                    host.innerHTML = '<p class="empty">Записей не найдено</p>';
                    return;
                }
                host.innerHTML = `
                    <table class="logs-table">
                        <thead>
                            <tr>
                                <th>Дата и время</th>
                                <th>Сотрудник</th>
                                <th>Роль</th>
                                <th>Действие</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${logs.map(l => `
                                <tr>
                                    <td class="log-meta">${new Date(l.created_at).toLocaleString('ru-RU')}</td>
                                    <td>${l.fullname || 'ID ' + l.user_id}<br><span class="log-meta">${l.phone || ''}</span></td>
                                    <td><span class="role-badge role-${l.role || 'employee'}">${l.role === 'admin' ? 'Админ' : 'Сотрудник'}</span></td>
                                    <td class="log-action">${l.action}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (e) {
                host.innerHTML = '<p class="empty">Не удалось загрузить журнал</p>';
            }
        }

        function setDefaultDates() {
            const to = getMoscowDateStr();
            const from = addDaysToDateStr(to, -14);
            document.getElementById('dateTo').value = to;
            document.getElementById('dateFrom').value = from;
            document.getElementById('dateTo').max = to;
            document.getElementById('dateFrom').max = to;
        }

        window.onload = () => {
            if (!token) { location.href = '/employee/login.html'; return; }
            setDefaultDates();
            load();
        };
    </script>
</body>
</html>
