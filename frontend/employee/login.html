<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zerno — Вход для сотрудников</title>
    <link rel="stylesheet" href="../shared/staff-login.css">
</head>
<body class="staff-login-page">
    <div class="staff-login-card">
        <h2 class="card-welcome-title">Вход для сотрудников</h2>
        <p class="modal-subtitle">Войдите по email или телефону и паролю</p>

        <div class="form-group">
            <label for="login">Email или телефон</label>
            <input type="text" id="login" placeholder="your@email.com или +375291112233" autocomplete="username">
        </div>

        <div class="form-group">
            <label for="password">Пароль</label>
            <div class="password-wrapper">
                <input type="password" id="password" placeholder="Введите пароль" autocomplete="current-password">
                <button type="button" class="toggle-password" onclick="togglePassword('password', this)">Показать</button>
            </div>
        </div>

        <button type="button" class="btn-primary btn-full" id="loginBtn" onclick="login()">Войти</button>
        <div id="error" class="error-message"></div>
    </div>

    <script>
        const API = '/api';

        function togglePassword(fieldId, btn) {
            const input = document.getElementById(fieldId);
            if (!input || !btn) return;
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = 'Скрыть';
            } else {
                input.type = 'password';
                btn.textContent = 'Показать';
            }
        }

        async function login() {
            const password = document.getElementById('password').value;
            const loginVal = document.getElementById('login').value.trim();
            const errorDiv = document.getElementById('error');
            const btn = document.getElementById('loginBtn');
            errorDiv.textContent = '';

            if (!loginVal) {
                errorDiv.textContent = 'Введите email или телефон';
                return;
            }
            if (!password) {
                errorDiv.textContent = 'Введите пароль';
                return;
            }

            const body = { password };
            if (loginVal.includes('@')) {
                if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(loginVal)) {
                    errorDiv.textContent = 'Введите корректный email';
                    return;
                }
                body.email = loginVal.toLowerCase();
            } else {
                body.phone = loginVal;
            }

            btn.disabled = true;
            try {
                const response = await fetch(API + '/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('userRole', data.user.role);
                    localStorage.setItem('userName', data.user.fullname || data.user.email || data.user.phone);

                    if (data.user.role === 'admin') {
                        window.location.href = '/admin/index.html';
                    } else if (data.user.role === 'employee') {
                        window.location.href = '/employee/index.html';
                    } else {
                        errorDiv.textContent = 'Нет доступа к панели персонала';
                        localStorage.removeItem('token');
                    }
                } else {
                    errorDiv.textContent = data.error || 'Неверный логин или пароль';
                }
            } catch (err) {
                errorDiv.textContent = 'Не удалось подключиться к серверу';
            } finally {
                btn.disabled = false;
            }
        }

        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
        document.getElementById('login').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
