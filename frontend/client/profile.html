<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zerno — Профиль</title>
    <link rel="stylesheet" href="../shared/zerno-theme.css">
    <script src="../shared/zerno-utils.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-main); color: var(--primary); margin: 0; }
        .container { max-width: 900px; margin: 30px auto; padding: 0 20px 60px; }
        .profile-card {
            background: white; border-radius: 20px; padding: 30px;
            border: 1px solid var(--border); margin-bottom: 24px;
        }
        .avatar-large {
            width: 90px; height: 90px; border-radius: 50%;
            background: var(--primary); color: var(--accent);
            display: flex; align-items: center; justify-content: center;
            font-size: 36px; font-weight: bold; margin-bottom: 16px;
        }
        .form-grid { display: grid; gap: 16px; }
        .form-group label { font-weight: 600; font-size: 13px; color: var(--text-muted); display: block; margin-bottom: 6px; }
        .form-group input {
            width: 100%; padding: 12px; border: 2px solid var(--border);
            border-radius: 12px; font-family: inherit; box-sizing: border-box;
        }
        .btn-primary {
            background: var(--primary); color: #f5e6d3; border: none;
            padding: 12px 28px; border-radius: 30px; cursor: pointer; font-weight: 600;
        }
        .btn-outline {
            background: transparent; border: 2px solid var(--border);
            color: var(--primary); padding: 10px 24px; border-radius: 30px; cursor: pointer;
        }
        .section-title { font-family: Georgia, serif; font-size: 22px; margin: 24px 0 12px; }
        .order-card {
            background: #fef8f0; border-radius: 14px; padding: 16px;
            margin-bottom: 12px; border: 1px solid var(--border);
        }
        .order-items { font-size: 13px; color: var(--text-muted); margin-top: 8px; }
        .btn-cancel {
            background: transparent; border: 1px solid var(--danger);
            color: var(--danger); padding: 6px 14px; border-radius: 20px;
            cursor: pointer; font-size: 12px; margin-top: 10px;
        }
        .tabs { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
        .tab {
            padding: 8px 20px; border-radius: 20px; border: 2px solid var(--border);
            background: white; cursor: pointer; font-weight: 500;
        }
        .tab.active { background: var(--primary); color: #f5e6d3; border-color: var(--primary); }
        .password-panel { margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }
        .password-panel.hidden { display: none; }
        .hint { font-size: 13px; color: var(--text-muted); margin-bottom: 12px; }
    </style>
</head>
<body>
    <div class="success-toast" id="profileToast" style="display:none;position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#2d2418;color:#f5e6d3;padding:14px 24px;border-radius:30px;z-index:9999;font-size:14px;box-shadow:0 4px 20px rgba(0,0,0,0.15);"></div>
    <header class="page-header">
        <a href="index.html"><span class="material-symbols-rounded">arrow_back</span> На главную</a>
        <strong>Профиль</strong>
        <button class="btn-primary" style="padding:8px 16px;font-size:13px;" onclick="logout()">Выйти</button>
    </header>

    <div class="container">
        <div class="profile-card">
            <div class="avatar-large" id="avatarLetter">?</div>
            <h2 id="displayName">Загрузка...</h2>
            <p id="displayEmail" style="color:var(--text-muted);"></p>
        </div>

        <div class="profile-card">
            <h3 class="section-title">Редактирование данных</h3>
            <div class="form-grid">
                <div class="form-group"><label>ФИО</label><input id="editFullname"></div>
                <div class="form-group"><label>Email</label><input id="editEmail" type="email"></div>
                <div class="form-group"><label>Телефон</label><input id="editPhone"></div>
            </div>
            <button class="btn-primary" style="margin-top:20px;" onclick="saveProfile()">Сохранить данные</button>

            <div class="password-panel" id="passwordPanel">
                <h3 class="section-title" style="margin-top:0;">Смена пароля</h3>
                <p class="hint">На ваш email придёт код подтверждения</p>
                <div id="pwdStep1">
                    <button class="btn-outline" type="button" onclick="sendChangePasswordCode()">Отправить код на email</button>
                </div>
                <div id="pwdStep2" class="hidden">
                    <p class="hint" id="pwdMailHint">Код отправлен на ваш email.</p>
                    <div class="form-group" style="margin-top:16px;"><label>Код из письма</label><input id="pwdCode" maxlength="6" inputmode="numeric" placeholder="6 цифр"></div>
                    <div class="form-group"><label>Новый пароль</label><input id="pwdNew" type="password"></div>
                    <div class="form-group"><label>Подтверждение</label><input id="pwdNew2" type="password"></div>
                    <button class="btn-primary" style="margin-top:12px;" onclick="confirmChangePassword()">Изменить пароль</button>
                    <button type="button" class="btn-outline" style="margin-top:10px;" onclick="sendChangePasswordCode()">Отправить код снова</button>
                </div>
            </div>
        </div>

        <h3 class="section-title">Заказы</h3>
        <div class="tabs">
            <button class="tab active" onclick="showOrdersTab('active')">Текущие</button>
            <button class="tab" onclick="showOrdersTab('history')">История</button>
        </div>
        <div id="ordersList"></div>
    </div>

    <script>
        const API = 'http://localhost:3000/api';
        let allOrders = [];
        let ordersTab = 'active';

        function getToken() { return localStorage.getItem('token'); }

        function showProfileToast(message) {
            const t = document.getElementById('profileToast');
            if (!t) return;
            t.textContent = message;
            t.style.display = 'block';
            setTimeout(() => { t.style.display = 'none'; }, 3500);
        }

        async function loadProfile() {
            if (!getToken()) { window.location.href = 'index.html'; return; }
            const res = await fetch(API + '/user/profile', {
                headers: { 'Authorization': 'Bearer ' + getToken() }
            });
            if (!res.ok) { logout(); return; }
            const user = await res.json();
            if (user.role !== 'client') { logout(); return; }
            document.getElementById('displayName').textContent = user.fullname || 'Гость';
            document.getElementById('displayEmail').textContent = user.email || user.phone || '';
            document.getElementById('avatarLetter').textContent = (user.fullname || 'Г')[0].toUpperCase();
            document.getElementById('editFullname').value = user.fullname || '';
            document.getElementById('editEmail').value = user.email || '';
            document.getElementById('editPhone').value = user.phone || '';
            setupPhoneInput('editPhone');
        }

        async function loadOrders() {
            const res = await fetch(API + '/my-orders/detailed', {
                headers: { 'Authorization': 'Bearer ' + getToken() }
            });
            allOrders = await res.json();
            renderOrders();
        }

        function showOrdersTab(tab) {
            ordersTab = tab;
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', (tab === 'active' && i === 0) || (tab === 'history' && i === 1));
            });
            renderOrders();
        }

        function renderOrders() {
            const list = ordersTab === 'active'
                ? allOrders.filter(o => !['выдан', 'отменён'].includes(o.status))
                : allOrders.filter(o => ['выдан', 'отменён'].includes(o.status));

            const container = document.getElementById('ordersList');
            if (!list.length) {
                container.innerHTML = '<p style="color:var(--text-muted);">Нет заказов</p>';
                return;
            }

            container.innerHTML = list.map(o => `
                <div class="order-card">
                    <div><strong>Заказ #${o.id}</strong>
                        <span class="status-badge status-${o.status.replace(/\s/g, '-')}">${o.status}</span>
                    </div>
                    <div>${o.order_date} ${o.order_time} · ${o.total.toFixed(2)} BYN · ${o.payment_method || ''}</div>
                    ${o.comment ? `<div style="font-size:13px;margin-top:6px;font-style:italic;">${o.comment}</div>` : ''}
                    <div class="order-items">${(o.items || []).map(i => `${i.name} ×${i.quantity}`).join(', ')}</div>
                    ${o.can_cancel ? `<button class="btn-cancel" onclick="cancelOrder(${o.id})">Отменить заказ${o.cancel_minutes_left ? ' (осталось ~' + o.cancel_minutes_left + ' мин)' : ''}</button>` : (o.status !== 'отменён' && o.status !== 'выдан' ? '<p style="font-size:12px;color:var(--text-muted);margin-top:8px;">Отмена доступна только в течение 10 минут после оформления</p>' : '')}
                </div>
            `).join('');
        }

        async function cancelOrder(id) {
            if (!confirm('Отменить заказ?')) return;
            const res = await fetch(API + `/orders/${id}/cancel`, {
                method: 'PUT',
                headers: { 'Authorization': 'Bearer ' + getToken() }
            });
            const data = await res.json();
            if (res.ok) { alert('Заказ отменён'); loadOrders(); }
            else alert(data.error || 'Ошибка');
        }

        async function saveProfile() {
            const body = {
                fullname: document.getElementById('editFullname').value,
                email: document.getElementById('editEmail').value,
                phone: getPhoneForSubmit('editPhone')
            };
            const res = await fetch(API + '/user/profile', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken() },
                body: JSON.stringify(body)
            });
            const data = await res.json().catch(() => ({}));
            if (res.ok) { alert('Сохранено'); loadProfile(); }
            else alert(data.error || 'Ошибка сохранения');
        }

        async function sendChangePasswordCode() {
            const btn = event?.target?.closest?.('button');
            if (btn) { btn.disabled = true; btn.dataset.prev = btn.innerText; btn.innerText = 'Отправка…'; }
            try {
                const res = await fetch(API + '/auth/change-password/send-code', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + getToken() }
                });
                const data = await res.json().catch(() => ({}));
                if (res.ok) {
                    document.getElementById('pwdStep2').classList.remove('hidden');
                    if (data.devCode) document.getElementById('pwdCode').value = data.devCode;
                    const hint = document.getElementById('pwdMailHint');
                    if (hint) hint.textContent = data.message || 'Код отправлен на email';
                    showProfileToast(data.devCode ? 'Код: ' + data.devCode : (data.message || 'Код отправлен на email'));
                } else alert(data.error || 'Ошибка');
            } finally {
                if (btn) { btn.disabled = false; if (btn.dataset.prev) btn.innerText = btn.dataset.prev; }
            }
        }

        function validatePwd(pass) {
            return pass.length >= 7 && /[A-Z]/.test(pass) && /[0-9]/.test(pass) && /[!@#$%^&*(),.?":{}|<>]/.test(pass);
        }

        async function confirmChangePassword() {
            const code = document.getElementById('pwdCode').value.trim();
            const p1 = document.getElementById('pwdNew').value;
            const p2 = document.getElementById('pwdNew2').value;
            if (!code) return alert('Введите код');
            if (!validatePwd(p1)) return alert('Пароль не соответствует требованиям');
            if (p1 !== p2) return alert('Пароли не совпадают');
            const res = await fetch(API + '/auth/change-password/confirm', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken() },
                body: JSON.stringify({ code, password: p1 })
            });
            const data = await res.json();
            if (res.ok) {
                showProfileToast('Пароль успешно изменён');
                document.getElementById('pwdCode').value = '';
                document.getElementById('pwdNew').value = '';
                document.getElementById('pwdNew2').value = '';
                document.getElementById('pwdStep1').style.display = 'block';
                document.getElementById('pwdStep2').classList.add('hidden');
            } else alert(data.error || 'Ошибка');
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = 'index.html';
        }

        window.onload = () => { loadProfile(); loadOrders(); };
    </script>
</body>
</html>
