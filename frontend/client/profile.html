<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zerno — Профиль</title>
    <link rel="stylesheet" href="../shared/zerno-theme.css">
    <script src="../shared/zerno-utils.js"></script>
    <script src="../shared/zerno-dialog.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-main); color: var(--primary); margin: 0; }
        .container { max-width: 900px; margin: 30px auto; padding: 0 20px 60px; }
        .profile-card {
            background: white; border-radius: 20px; padding: 30px;
            border: 1px solid var(--border); margin-bottom: 24px;
        }
        .avatar-large {
            width: 90px; height: 90px; border-radius: 50%;
            background: var(--primary); color: var(--accent);
            display: flex; align-items: center; justify-content: center;
            font-size: 36px; font-weight: bold; margin-bottom: 16px;
        }
        .form-grid { display: grid; gap: 16px; }
        .form-group label { font-weight: 600; font-size: 13px; color: var(--text-muted); display: block; margin-bottom: 6px; }
        .form-group input {
            width: 100%; padding: 12px; border: 2px solid var(--border);
            border-radius: 12px; font-family: inherit; box-sizing: border-box;
        }
        .btn-primary {
            background: var(--primary); color: #f5e6d3; border: none;
            padding: 12px 28px; border-radius: 30px; cursor: pointer; font-weight: 600;
        }
        .btn-outline {
            background: transparent; border: 2px solid var(--border);
            color: var(--primary); padding: 10px 24px; border-radius: 30px; cursor: pointer;
        }
        .section-title { font-size: 26px; margin: 24px 0 12px; text-align: left; }
        .order-card {
            background: #fef8f0; border-radius: 14px; padding: 16px;
            margin-bottom: 12px; border: 1px solid var(--border);
            display: flex; align-items: flex-start; justify-content: space-between;
            gap: 16px;
        }
        .order-card-body { flex: 1; min-width: 0; }
        .order-card-actions { flex-shrink: 0; display: flex; align-items: flex-start; }
        .order-items { font-size: 13px; color: var(--text-muted); margin-top: 8px; }
        .pickup-code {
            margin-top: 10px;
            padding: 10px 14px;
            background: #fff;
            border: 1px dashed var(--border);
            border-radius: 10px;
            font-size: 14px;
        }
        .pickup-code strong { letter-spacing: 3px; font-size: 18px; color: var(--primary); }
        .btn-cancel {
            background: transparent; border: 1px solid var(--danger);
            color: var(--danger); padding: 8px 16px; border-radius: 20px;
            cursor: pointer; font-size: 13px; white-space: nowrap;
        }
        .btn-cancel:hover { background: rgba(192, 57, 43, 0.08); }
        .profile-edit-toggle {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 18px;
            border: 2px solid var(--border);
            border-radius: 14px;
            background: #fef8f0;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            font-family: inherit;
            color: var(--primary);
        }
        .profile-edit-toggle .material-symbols-rounded { transition: transform 0.2s; }
        .profile-edit-toggle[aria-expanded="true"] .material-symbols-rounded { transform: rotate(180deg); }
        .profile-edit-panel { display: none; margin-top: 20px; }
        .profile-edit-panel.open { display: block; }
        .tabs { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
        .tab {
            padding: 8px 20px; border-radius: 20px; border: 2px solid var(--border);
            background: white; cursor: pointer; font-weight: 500;
        }
        .tab.active { background: var(--primary); color: #f5e6d3; border-color: var(--primary); }
        .password-panel { margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }
        .password-panel.hidden { display: none; }
        .hint { font-size: 13px; color: var(--text-muted); margin-bottom: 12px; }
        .my-booking-item {
            background: #fef8f0; border-radius: 14px; padding: 16px;
            margin-bottom: 12px; border: 1px solid var(--border);
            font-size: 14px; line-height: 1.5;
        }
        .my-booking-status {
            color: #fff; padding: 2px 10px; border-radius: 20px; font-size: 12px;
        }
        .my-booking-cancel { margin-top: 10px; font-size: 13px; }
    </style>
</head>
<body class="zerno-client">
    <div class="success-toast" id="profileToast" style="display:none;position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#2d2418;color:#f5e6d3;padding:14px 24px;border-radius:30px;z-index:9999;font-size:14px;box-shadow:0 4px 20px rgba(0,0,0,0.15);"></div>
    <header class="page-header">
        <a href="index.html"><span class="material-symbols-rounded">arrow_back</span> На главную</a>
        <strong>Профиль</strong>
        <button class="btn-primary" style="padding:8px 16px;font-size:13px;" onclick="logout()">Выйти</button>
    </header>

    <div class="container">
        <div class="profile-card">
            <div class="avatar-large" id="avatarLetter">?</div>
            <h2 id="displayName">Загрузка...</h2>
            <p id="displayEmail" style="color:var(--text-muted);"></p>
        </div>

        <div class="profile-card">
            <button type="button" class="profile-edit-toggle" id="profileEditToggle" aria-expanded="false" onclick="toggleProfileEdit()">
                <span>Редактирование профиля</span>
                <span class="material-symbols-rounded">expand_more</span>
            </button>
            <div class="profile-edit-panel" id="profileEditPanel">
            <div class="form-grid">
                <div class="form-group"><label>ФИО</label><input id="editFullname"></div>
                <div class="form-group"><label>Email</label><input id="editEmail" type="email"></div>
                <div class="form-group"><label>Телефон</label><input id="editPhone"></div>
            </div>
            <button class="btn-primary" style="margin-top:20px;" onclick="saveProfile()">Сохранить данные</button>

            <div class="password-panel" id="passwordPanel">
                <h3 class="section-title" style="margin-top:0;">Смена пароля</h3>
                <p class="hint">На ваш email придёт код подтверждения</p>
                <div id="pwdStep1">
                    <button class="btn-outline" type="button" onclick="sendChangePasswordCode()">Отправить код на email</button>
                </div>
                <div id="pwdStep2" class="hidden">
                    <p class="hint" id="pwdMailHint">Код отправлен на ваш email.</p>
                    <div class="form-group" style="margin-top:16px;"><label>Код из письма</label><input id="pwdCode" maxlength="6" inputmode="numeric" placeholder="6 цифр"></div>
                    <div class="form-group"><label>Новый пароль</label><input id="pwdNew" type="password"></div>
                    <div class="form-group"><label>Подтверждение</label><input id="pwdNew2" type="password"></div>
                    <button class="btn-primary" style="margin-top:12px;" onclick="confirmChangePassword()">Изменить пароль</button>
                    <button type="button" class="btn-outline" style="margin-top:10px;" onclick="sendChangePasswordCode()">Отправить код снова</button>
                </div>
            </div>
            </div>
        </div>

        <h3 class="section-title">Бронирования столов</h3>
        <div class="tabs" id="bookingsTabs">
            <button class="tab active" data-bookings-tab="active" onclick="showBookingsTab('active')">Предстоящие</button>
            <button class="tab" data-bookings-tab="history" onclick="showBookingsTab('history')">История</button>
        </div>
        <div id="bookingsList"></div>

        <h3 class="section-title">Заказы</h3>
        <div class="tabs" id="ordersTabs">
            <button class="tab active" data-orders-tab="active" onclick="showOrdersTab('active')">Текущие</button>
            <button class="tab" data-orders-tab="history" onclick="showOrdersTab('history')">История</button>
        </div>
        <div id="ordersList"></div>
    </div>

    <script>
        const API = '/api';
        const ZERNO_BOOKINGS_TAB_KEY = 'zerno_bookings_tab';
        let allOrders = [];
        let allBookings = [];
        let ordersTab = sessionStorage.getItem(ZERNO_ORDERS_TAB_KEY) || 'active';
        let bookingsTab = sessionStorage.getItem(ZERNO_BOOKINGS_TAB_KEY) || 'active';
        let orderStatusMap = {};
        let ordersPollTimer = null;

        function getToken() { return getAuthToken(); }

        function showProfileToast(message, type) {
            if (typeof appNotify === 'function') appNotify(message, type || 'success');
        }

        function toggleProfileEdit() {
            const panel = document.getElementById('profileEditPanel');
            const btn = document.getElementById('profileEditToggle');
            const open = panel.classList.toggle('open');
            btn.setAttribute('aria-expanded', open ? 'true' : 'false');
        }

        function applyProfileUi(user) {
            document.getElementById('displayName').textContent = user.fullname || 'Гость';
            document.getElementById('displayEmail').textContent = user.email || user.phone || '';
            document.getElementById('avatarLetter').textContent = (user.fullname || 'Г')[0].toUpperCase();
            document.getElementById('editFullname').value = user.fullname || '';
            document.getElementById('editEmail').value = user.email || '';
            document.getElementById('editPhone').value = user.phone || '';
        }

        async function loadProfile() {
            const token = getAuthToken();
            if (!token) {
                window.location.href = 'index.html';
                return;
            }

            const cached = loadClientSession();
            if (cached) {
                window.currentUser = cached;
                applyProfileUi(cached);
            }

            const result = await fetchClientProfile(token);
            if (result.ok && result.user) {
                if (!isClientRole(result.user, token)) {
                    clearClientSession();
                    window.location.href = 'index.html';
                    return;
                }
                saveClientSession(result.user, token);
                window.currentUser = result.user;
                applyProfileUi(result.user);
                setupPhoneInput('editPhone');
                return;
            }

            if (result.authFailed) {
                clearClientSession();
                window.location.href = 'index.html';
                return;
            }

            if (!cached) {
                appNotify('Не удалось загрузить профиль. Проверьте, что сервер запущен.', 'error');
            }
        }

        async function loadOrders() {
            const res = await fetch(API + '/my-orders/detailed', {
                headers: { 'Authorization': 'Bearer ' + getToken() }
            });
            if (!res.ok) return;
            const orders = await res.json();
            if (!Array.isArray(orders)) return;
            orderStatusMap = trackOrderStatusChanges(orders, orderStatusMap);
            allOrders = orders;
            renderOrders();
        }

        function startOrdersPolling() {
            if (ordersPollTimer) return;
            ordersPollTimer = setInterval(loadOrders, 20000);
        }

        function showOrdersTab(tab) {
            ordersTab = tab;
            sessionStorage.setItem(ZERNO_ORDERS_TAB_KEY, tab);
            document.querySelectorAll('#ordersTabs .tab').forEach((t) => {
                t.classList.toggle('active', t.dataset.ordersTab === tab);
            });
            renderOrders();
        }

        function showBookingsTab(tab) {
            bookingsTab = tab;
            sessionStorage.setItem(ZERNO_BOOKINGS_TAB_KEY, tab);
            document.querySelectorAll('#bookingsTabs .tab').forEach((t) => {
                t.classList.toggle('active', t.dataset.bookingsTab === tab);
            });
            renderBookings();
        }

        async function loadBookings() {
            const res = await fetch(API + '/my-bookings', {
                headers: { Authorization: 'Bearer ' + getToken() }
            });
            if (!res.ok) return;
            const bookings = await res.json();
            allBookings = Array.isArray(bookings) ? bookings : [];
            renderBookings();
        }

        async function cancelBookingProfile(bookingId) {
            if (typeof showAppConfirm === 'function') {
                const ok = await showAppConfirm('Отменить это бронирование?', {
                    title: 'Отмена бронирования',
                    confirmLabel: 'Отменить',
                    danger: true
                });
                if (!ok) return;
            } else if (!confirm('Отменить бронирование?')) {
                return;
            }
            await cancelBooking(bookingId);
            await loadBookings();
        }

        function renderBookings() {
            const list = bookingsTab === 'active'
                ? allBookings.filter((b) => isBookingActiveStatus(b.status))
                : allBookings.filter((b) => isBookingHistoryStatus(b.status));
            const container = document.getElementById('bookingsList');
            if (!container) return;
            container.innerHTML = renderUserBookingsHtml(list, { showCancel: bookingsTab === 'active' });
            bindBookingCancelButtons(container, cancelBookingProfile);
        }

        function formatPaymentLabel(m) {
            if (!m) return '';
            if (m === 'карта' || m === 'банковская карта') return 'Банковская карта';
            if (m === 'наличные') return 'Наличные';
            return m;
        }

        function renderOrders() {
            const list = ordersTab === 'active'
                ? allOrders.filter(o => isOrderActiveStatus(o.status))
                : allOrders.filter(o => isOrderHistoryStatus(o.status));

            const container = document.getElementById('ordersList');
            if (!list.length) {
                container.innerHTML = '<p style="color:var(--text-muted);">Нет заказов</p>';
                return;
            }

            container.innerHTML = list.map(o => `
                <div class="order-card">
                    <div class="order-card-body">
                        <div><strong>Заказ #${o.id}</strong>
                            <span class="status-badge status-${o.status.replace(/\s/g, '-')}">${o.status}</span>
                        </div>
                        <div>${o.order_date} ${o.order_time} · ${Number(o.total || 0).toFixed(2)} BYN · ${formatPaymentLabel(o.payment_method)}</div>
                        ${o.comment ? `<div style="font-size:13px;margin-top:6px;font-style:italic;">${o.comment}</div>` : ''}
                        <div class="order-items">${(o.items || []).map(i => `${i.name} ×${i.quantity}`).join(', ')}</div>
                        ${o.status === 'готов к выдаче' && o.pickup_code ? `<div class="pickup-code">Код для получения: <strong>${o.pickup_code}</strong></div>` : ''}
                    </div>
                    ${canCancelOrderClient(o) ? `<div class="order-card-actions"><button type="button" class="btn-cancel" onclick="cancelOrder(${o.id})">Отменить заказ</button></div>` : ''}
                </div>
            `).join('');
        }

        async function cancelOrder(id) {
            const o = allOrders.find(x => x.id === id);
            if (!o) return;
            if (typeof showAppConfirm !== 'function') {
                if (!confirm('Отменить заказ #' + id + '?')) return;
            } else {
                const itemsList = (o.items || []).map(i => `• ${i.name} ×${i.quantity}`).join('<br>');
                const total = Number(o.total || 0).toFixed(2);
                const msg = `<strong>Заказ #${o.id}</strong><br>
                    ${o.order_date} ${o.order_time}<br>
                    ${itemsList}<br><br>
                    Итого: <strong>${total} BYN</strong><br>
                    Оплата: ${formatPaymentLabel(o.payment_method)}<br><br>
                    Вы уверены, что хотите отменить заказ?`;
                const ok = await showAppConfirm(msg, {
                    title: 'Отмена заказа',
                    confirmLabel: 'Да, отменить',
                    cancelLabel: 'Нет',
                    danger: true,
                    html: true
                });
                if (!ok) return;
            }
            try {
                const res = await fetch(API + `/orders/${id}/cancel`, {
                    method: 'PUT',
                    headers: { 'Authorization': 'Bearer ' + getToken() }
                });
                const data = await res.json().catch(() => ({}));
                if (res.ok) {
                    const idx = allOrders.findIndex(x => x.id === id);
                    if (idx >= 0) allOrders[idx].status = 'отменён';
                    orderStatusMap[String(id)] = 'отменён';
                    showProfileToast('Заказ отменён');
                    ordersTab = 'history';
                    sessionStorage.setItem(ZERNO_ORDERS_TAB_KEY, 'history');
                    document.querySelectorAll('.tab').forEach((t, i) => {
                        t.classList.toggle('active', i === 1);
                    });
                    renderOrders();
                    loadOrders();
                } else {
                    appNotify(data.error || 'Ошибка отмены', 'error');
                }
            } catch (e) {
                appNotify('Не удалось отменить заказ', 'error');
            }
        }

        async function saveProfile() {
            const token = getAuthToken();
            if (!token) {
                appNotify('Сессия истекла, войдите снова', 'error');
                return;
            }
            const body = {
                fullname: document.getElementById('editFullname').value,
                email: document.getElementById('editEmail').value,
                phone: getPhoneForSubmit('editPhone')
            };
            const res = await fetch(API + '/user/profile', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
                body: JSON.stringify(body)
            });
            const data = await res.json().catch(() => ({}));
            if (res.ok) {
                const user = data.id ? data : { ...loadClientSession(), ...body };
                saveClientSession(user, token);
                applyProfileUi(user);
                showProfileToast('Данные сохранены');
            } else if (shouldForceClientLogout(res.status, token)) {
                clearClientSession();
                window.location.href = 'index.html';
            } else {
                appNotify(data.error || 'Ошибка сохранения', 'error');
            }
        }

        async function sendChangePasswordCode() {
            const btn = event?.target?.closest?.('button');
            if (btn) { btn.disabled = true; btn.dataset.prev = btn.innerText; btn.innerText = 'Отправка…'; }
            try {
                const res = await fetch(API + '/auth/change-password/send-code', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + getToken() }
                });
                const data = await res.json().catch(() => ({}));
                if (res.ok) {
                    document.getElementById('pwdStep2').classList.remove('hidden');
                    if (data.devCode) document.getElementById('pwdCode').value = data.devCode;
                    const hint = document.getElementById('pwdMailHint');
                    if (hint) hint.textContent = data.message || 'Код отправлен на email';
                    showProfileToast(data.devCode ? 'Код: ' + data.devCode : (data.message || 'Код отправлен на email'));
                } else appNotify(data.error || 'Ошибка', 'error');
            } finally {
                if (btn) { btn.disabled = false; if (btn.dataset.prev) btn.innerText = btn.dataset.prev; }
            }
        }

        function validatePwd(pass) {
            return pass.length >= 7 && /[A-Z]/.test(pass) && /[0-9]/.test(pass) && /[!@#$%^&*(),.?":{}|<>]/.test(pass);
        }

        async function confirmChangePassword() {
            const code = document.getElementById('pwdCode').value.trim();
            const p1 = document.getElementById('pwdNew').value;
            const p2 = document.getElementById('pwdNew2').value;
            if (!code) return appNotify('Введите код из письма', 'error');
            if (!validatePwd(p1)) return appNotify('Пароль не соответствует требованиям', 'error');
            if (p1 !== p2) return appNotify('Пароли не совпадают', 'error');
            const res = await fetch(API + '/auth/change-password/confirm', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken() },
                body: JSON.stringify({ code, password: p1 })
            });
            const data = await res.json();
            if (res.ok) {
                showProfileToast('Пароль успешно изменён');
                document.getElementById('pwdCode').value = '';
                document.getElementById('pwdNew').value = '';
                document.getElementById('pwdNew2').value = '';
                document.getElementById('pwdStep1').style.display = 'block';
                document.getElementById('pwdStep2').classList.add('hidden');
            } else appNotify(data.error || 'Ошибка', 'error');
        }

        function logout() {
            clearClientSession();
            sessionStorage.removeItem(ZERNO_ORDERS_TAB_KEY);
            window.location.href = 'index.html';
        }

        window.onload = () => {
            document.querySelectorAll('#ordersTabs .tab').forEach((t) => {
                t.classList.toggle('active', t.dataset.ordersTab === ordersTab);
            });
            document.querySelectorAll('#bookingsTabs .tab').forEach((t) => {
                t.classList.toggle('active', t.dataset.bookingsTab === bookingsTab);
            });
            loadProfile();
            loadBookings();
            loadOrders().then(startOrdersPolling);
        };
    </script>
</body>
</html>
