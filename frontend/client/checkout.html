<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zerno — Оформление заказа</title>
    <link rel="stylesheet" href="../shared/zerno-theme.css">
    <script src="../shared/zerno-utils.js"></script>
    <script src="../shared/zerno-dialog.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-main); color: var(--primary); margin: 0; }
        .container { max-width: 700px; margin: 30px auto; padding: 0 20px 60px; }
        .card {
            background: white; border-radius: 20px; padding: 28px;
            border: 1px solid var(--border); margin-bottom: 20px;
        }
        .form-group { margin-bottom: 18px; }
        .form-group label { font-weight: 600; font-size: 13px; display: block; margin-bottom: 6px; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 12px; border: 2px solid var(--border);
            border-radius: 12px; font-family: inherit; box-sizing: border-box;
        }
        .form-group input[readonly] { background: #fef8f0; color: #4a3a2a; cursor: default; }
        .char-count { font-size: 12px; color: var(--text-muted); text-align: right; }
        .summary-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f5f0e8; font-size: 14px; }
        .total-row { font-size: 20px; font-weight: bold; margin-top: 12px; }
        .btn-primary {
            width: 100%; background: var(--primary); color: #f5e6d3; border: none;
            padding: 14px; border-radius: 30px; font-size: 16px; font-weight: 600; cursor: pointer;
        }
        .hint { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
        .tz-note { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; }
        .time-row { display: flex; align-items: center; gap: 10px; }
        .time-row input[type="time"] { flex: 1; min-width: 0; }
        .time-step-btn {
            flex-shrink: 0;
            width: 44px;
            height: 44px;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: #fef8f0;
            color: var(--primary);
            font-size: 22px;
            font-weight: 600;
            cursor: pointer;
            line-height: 1;
        }
        .time-step-btn:hover:not(:disabled) { background: var(--primary); color: #f5e6d3; }
        .time-step-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
</head>
<body class="zerno-client">
    <header class="page-header">
        <a href="index.html"><span class="material-symbols-rounded">arrow_back</span> Назад</a>
        <strong>Оформление заказа</strong>
        <span></span>
    </header>

    <div class="container">
        <div class="card" id="orderSummary"></div>
        <div class="card">
            <div class="form-group">
                <label>Адрес самовывоза</label>
                <input type="text" id="pickupAddress" readonly>
            </div>
            <div class="form-group">
                <label>Дата самовывоза</label>
                <input type="date" id="orderDate">
            </div>
            <div class="form-group">
                <label>Время</label>
                <div class="time-row">
                    <button type="button" class="time-step-btn" id="timeMinus" title="На 30 минут раньше" aria-label="Минус 30 минут">−</button>
                    <input type="time" id="orderTime" step="60">
                    <button type="button" class="time-step-btn" id="timePlus" title="На 30 минут позже" aria-label="Плюс 30 минут">+</button>
                </div>
            </div>
            <div class="form-group">
                <label>Комментарий к заказу</label>
                <textarea id="orderComment" rows="3" maxlength="200" placeholder="Пожелания к заказу..."></textarea>
                <div class="char-count"><span id="charCount">0</span>/200</div>
            </div>
            <div class="form-group">
                <label>Способ оплаты</label>
                <select id="payment">
                    <option value="card">Банковская карта</option>
                    <option value="cash">Наличные</option>
                </select>
            </div>
            <button class="btn-primary" onclick="submitOrder()">Подтвердить заказ</button>
        </div>
    </div>

    <script>
        const API = '/api';
        const MAX_COMMENT = 200;
        let cart = [];

        function getToken() { return getAuthToken(); }

        function applySlotToInputs(slot) {
            document.getElementById('orderDate').value = slot.date;
            document.getElementById('orderTime').value = slot.time;
            updateTimeControls();
        }

        function getCurrentSlot() {
            return clampPickupSlot(
                document.getElementById('orderDate').value,
                document.getElementById('orderTime').value
            );
        }

        function updateTimeControls() {
            const date = document.getElementById('orderDate').value;
            const time = document.getElementById('orderTime').value;
            const minBtn = document.getElementById('timeMinus');
            const plusBtn = document.getElementById('timePlus');
            const timeInput = document.getElementById('orderTime');

            if (!date || !time) return;

            const minAllowed = getMinPickupMinutesForDate(date);
            const cur = parseTimeHM(time);
            minBtn.disabled = cur <= minAllowed;
            plusBtn.disabled = cur >= CAFE_LAST_ORDER_MIN;

            timeInput.min = formatMinutesHM(CAFE_OPEN_MIN);
            timeInput.max = formatMinutesHM(CAFE_LAST_ORDER_MIN);
            if (date === getMoscowDateStr()) {
                timeInput.min = formatMinutesHM(minAllowed);
            }
        }

        function shiftTime(delta) {
            const date = document.getElementById('orderDate').value;
            const time = document.getElementById('orderTime').value;
            if (!date || !time) return;
            const next = adjustPickupSlot(date, time, delta);
            applySlotToInputs(next);
        }

        function initDates() {
            const slot = getMinOrderSlotMoscow();
            const dateInput = document.getElementById('orderDate');
            const timeInput = document.getElementById('orderTime');

            dateInput.min = slot.minDate;
            applySlotToInputs(slot);

            document.getElementById('pickupAddress').value = PICKUP_ADDRESS;

            dateInput.addEventListener('change', () => {
                const clamped = clampPickupSlot(dateInput.value, timeInput.value);
                applySlotToInputs(clamped);
            });

            timeInput.addEventListener('change', () => {
                const clamped = clampPickupSlot(dateInput.value, timeInput.value);
                applySlotToInputs(clamped);
            });

            document.getElementById('timeMinus').addEventListener('click', () => shiftTime(-ORDER_SLOT_STEP));
            document.getElementById('timePlus').addEventListener('click', () => shiftTime(ORDER_SLOT_STEP));
        }

        function renderSummary() {
            const total = cart.reduce((s, i) => s + i.price * i.quantity, 0);
            document.getElementById('orderSummary').innerHTML = `
                <h3 class="section-title" style="margin-bottom:12px;font-size:26px;text-align:left;">Ваш заказ</h3>
                ${cart.map(i => `<div class="summary-item"><span>${i.name} ×${i.quantity}</span><span>${(i.price * i.quantity).toFixed(2)} BYN</span></div>`).join('')}
                <div class="total-row">Итого: ${total.toFixed(2)} BYN</div>
            `;
        }

        document.getElementById('orderComment').addEventListener('input', function() {
            document.getElementById('charCount').textContent = this.value.length;
        });

        async function submitOrder() {
            const comment = document.getElementById('orderComment').value;
            if (comment.length > MAX_COMMENT) {
                appNotify('Комментарий не более 200 символов', 'error');
                return;
            }
            const slot = getCurrentSlot();
            const err = validatePickupSlot(slot.date, slot.time);
            if (err) {
                appNotify(err, 'error');
                return;
            }
            const order = {
                items: cart,
                total: cart.reduce((s, i) => s + i.price * i.quantity, 0),
                date: slot.date,
                time: slot.time,
                comment,
                paymentMethod: document.getElementById('payment').value
            };
            const res = await fetch(API + '/orders', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + getToken()
                },
                body: JSON.stringify(order)
            });
            const data = await res.json();
            if (res.ok) {
                localStorage.removeItem('zerno_cart');
                appNotify('Заказ оформлен', 'success');
                setTimeout(() => { window.location.href = 'profile.html'; }, 900);
            } else {
                appNotify(data.error || 'Ошибка оформления', 'error');
            }
        }

        window.onload = () => {
            if (!getToken()) { window.location.href = 'index.html'; return; }
            try { cart = JSON.parse(localStorage.getItem('zerno_cart') || '[]'); } catch(e) { cart = []; }
            if (!cart.length) { window.location.href = 'index.html'; return; }
            initDates();
            renderSummary();
        };
    </script>
</body>
</html>
